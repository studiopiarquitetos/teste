<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:system-ui,sans-serif;background:#FAF9F6;color:#1A1A1A;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:60px 20px}

.card h3{font-size:15px;font-weight:600}
.card p{color:#6B6560;font-size:12px;margin:4px 0 0}
.arrow{color:#C76C4D;font-size:18px}
.badge{font-size:11px;color:#C76C4D;background:rgba(199,108,77,.1);padding:4px 12px;border-radius:12px;display:inline-block;margin-bottom:20px}
